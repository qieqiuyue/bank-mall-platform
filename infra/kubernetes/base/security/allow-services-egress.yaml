apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-services-egress
  namespace: bank-mall
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: bank-mall
  policyTypes:
  - Egress
  egress:
  # Allow access to MySQL
  - to:
    - podSelector:
        matchLabels:
          app: mysql
    ports:
    - protocol: TCP
      port: 3306
  # Allow service-to-service HTTP (payment→account→notification)
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/part-of: bank-mall
    ports:
    - protocol: TCP
      port: 8081
    - protocol: TCP
      port: 8082
    - protocol: TCP
      port: 8083
    - protocol: TCP
      port: 8084
  # Allow OTEL trace/metric export to Jaeger (cross-namespace)
  # Merge into single egress policy to avoid Calico multi-policy aggregation issues
  - to:
    - namespaceSelector:
        matchLabels:
          name: jaeger
    ports:
    - protocol: TCP
      port: 4317
    - protocol: TCP
      port: 4318
    - protocol: TCP
      port: 16686
