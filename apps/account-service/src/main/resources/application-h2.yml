# H2 内存库 —— 快速启动验证，不依赖 MySQL
# 注意：必须同时覆盖 database-platform 和 properties.hibernate.dialect
spring:
  datasource:
    url: jdbc:h2:mem:bank_account;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
