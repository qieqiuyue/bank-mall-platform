apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Core resources for cloud deployment
# ACK provides its own NetworkPolicy (Terway/Flannel), monitoring, and autoscaling.
# Only deploy what's needed to run the 4 microservices + MySQL + Ingress.

resources:
  - namespace.yaml
  - configmap.yaml
  # MySQL
  - mysql/deployment.yaml
  - mysql/service.yaml
  - mysql/storage.yaml
  - mysql/initdb-configmap.yaml
  # Microservices
  - auth-service/deployment.yaml
  - auth-service/service.yaml
  - account-service/deployment.yaml
  - account-service/service.yaml
  - payment-service/deployment.yaml
  - payment-service/service.yaml
  - notification-service/deployment.yaml
  - notification-service/service.yaml
  # Ingress
  - ingress/ingressclass.yaml
  - ingress/controller-deploy.yaml
  - ingress/controller-service.yaml
  - ingress/controller-rbac.yaml
  - ingress/controller-configmap.yaml
  - ingress/ingress-rules.yaml
