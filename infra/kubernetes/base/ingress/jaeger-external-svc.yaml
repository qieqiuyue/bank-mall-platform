# ExternalName Service — maps bank-mall namespace → jaeger namespace
# Required because Ingress backends must be in the same namespace
apiVersion: v1
kind: Service
metadata:
  name: jaeger-ui
  namespace: bank-mall
spec:
  type: ExternalName
  externalName: jaeger-query.jaeger.svc.cluster.local
  ports:
  - port: 16686
    targetPort: 16686
