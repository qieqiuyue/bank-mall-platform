# Ingress Nginx Controller Deployment
# 镜像源说明：
#   - 官方镜像: registry.k8s.io/ingress-nginx/controller:v1.10.1  (可能被墙)
#   - 阿里云备用: registry.aliyuncs.com/google_containers/nginx-ingress-controller:v1.10.1
#   国内环境建议用阿里云镜像。如果 Harbor 已缓存则用 Harbor 地址。
#
# 前置操作（国内环境）:
#   ctr -n k8s.io images pull --plain-http registry.aliyuncs.com/google_containers/nginx-ingress-controller:v1.10.1
#   或先 docker pull → docker tag → docker push 到 Harbor，再改 image 为 10.0.0.61/bank-mall/ingress-nginx-controller:v1.10.1

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingress-nginx-controller
  namespace: ingress-nginx
  labels:
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/part-of: bank-mall
    app.kubernetes.io/component: ingress
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ingress-nginx
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ingress-nginx
        app.kubernetes.io/part-of: bank-mall
        app.kubernetes.io/component: ingress
    spec:
      serviceAccountName: ingress-nginx
      containers:
      - name: controller
        image: registry.aliyuncs.com/google_containers/nginx-ingress-controller:v1.10.1
        args:
        - /nginx-ingress-controller
        - --publish-service=$(POD_NAMESPACE)/ingress-nginx-controller
        - --election-id=ingress-nginx-leader
        - --controller-class=k8s.io/ingress-nginx
        - --ingress-class=nginx
        - --configmap=$(POD_NAMESPACE)/ingress-nginx-controller
        - --report-node-internal-ip-address
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        - name: https
          containerPort: 443
          protocol: TCP
        - name: webhook
          containerPort: 8443
          protocol: TCP
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: LD_PRELOAD
          value: /usr/local/lib/libmimalloc.so
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /healthz
            port: 10254
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 2
        readinessProbe:
          httpGet:
            path: /healthz
            port: 10254
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            add:
            - NET_BIND_SERVICE
            drop:
            - ALL
          runAsNonRoot: true
          runAsUser: 101
          seccompProfile:
            type: RuntimeDefault
      nodeName: k8s-worker01
      nodeSelector:
        kubernetes.io/os: linux
      terminationGracePeriodSeconds: 300
