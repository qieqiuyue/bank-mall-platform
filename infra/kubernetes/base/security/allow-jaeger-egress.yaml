apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-jaeger
  namespace: bank-mall
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: bank-mall
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: jaeger
    ports:
    - protocol: TCP
      port: 4317
    - protocol: TCP
      port: 4318
