# LimitRange — 为未指定 resources 的容器设置默认值，防止资源逃逸
apiVersion: v1
kind: LimitRange
metadata:
  name: bank-mall-limits
  namespace: bank-mall
spec:
  limits:
  - type: Container
    default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "100m"
      memory: "256Mi"
    max:
      cpu: "2"
      memory: "2Gi"
    min:
      cpu: "50m"
      memory: "128Mi"
