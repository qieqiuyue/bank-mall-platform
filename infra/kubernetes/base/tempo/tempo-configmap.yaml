apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: tempo
  labels:
    app: tempo
    app.kubernetes.io/part-of: bank-mall
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

    ingester:
      trace_idle_period: 10s
      max_block_bytes: 1_000_000
      max_block_duration: 30m

    compactor:
      compaction:
        block_retention: 48h

    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal

    querier:
      frontend_worker:
        frontend_address: 127.0.0.1:9095

    query_frontend:
      max_outstanding_per_tenant: 100

    overrides:
      metrics_generator_processors: [service-graphs, span-metrics]
