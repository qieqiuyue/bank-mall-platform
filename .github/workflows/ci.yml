name: Bank Mall CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'infra/**'
      - 'scripts/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.nju.edu.cn
  IMAGE_NAME: ${{ github.repository }}
  VERSION: ${{ github.sha }}

jobs:
  # ── Job 1: Secret detection (first gate) ──────────────────────
  gitleaks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 2: Static analysis ────────────────────────────────────
  semgrep:
    needs: gitleaks
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: semgrep/semgrep-action@v1
      with:
        config: >-
          p/java-lang-security
          p/generic-secrets
          p/java-spring-security

  # ── Job 3: Unit tests (parallel matrix) ───────────────────────
  test:
    needs: gitleaks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, account-service, payment-service, notification-service]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'
    - run: cd apps/common-lib && mvn install -DskipTests -q
    - run: cd apps/${{ matrix.service }} && mvn test -q

  # ── Job 4: Build + Trivy scan (main only, hard gate) ──────────
  build-and-scan:
    needs: [test, semgrep]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [auth-service, account-service, payment-service, notification-service]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'
    - run: cd apps/common-lib && mvn install -DskipTests -q
    - run: cd apps/${{ matrix.service }} && mvn package -DskipTests -q
    - uses: docker/setup-buildx-action@v3
    - uses: docker/build-push-action@v5
      with:
        context: apps
        file: apps/${{ matrix.service }}/Dockerfile
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ env.VERSION }}
        load: true
    - uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ env.VERSION }}
        severity: 'HIGH,CRITICAL'
        exit-code: 1
        format: 'table'

  # ── Job 5: Feishu notification ─────────────────────────────────
  notify:
    needs: [build-and-scan]
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - name: Feishu webhook
      env:
        FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
      run: |
        STATUS="${{ needs.build-and-scan.result }}"
        if [[ -z "${FEISHU_WEBHOOK}" ]]; then
          echo "[INFO] FEISHU_WEBHOOK secret not configured — skipping notification"
          exit 0
        fi
        curl -X POST "${FEISHU_WEBHOOK}" \
          -H "Content-Type: application/json" \
          -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"Bank Mall CI/CD: ${STATUS}\"}}"
