apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../base

# Image registry override: Harbor (10.0.0.61) → ACR (Guangzhou personal instance)
images:
  - name: 10.0.0.61/bank-mall/auth-service
    newName: crpi-czgg1cl74ayotw3x.cn-guangzhou.personal.cr.aliyuncs.com/qqy_my_re/bank-mall-auth
  - name: 10.0.0.61/bank-mall/account-service
    newName: crpi-czgg1cl74ayotw3x.cn-guangzhou.personal.cr.aliyuncs.com/qqy_my_re/bank-mall-account
  - name: 10.0.0.61/bank-mall/payment-service
    newName: crpi-czgg1cl74ayotw3x.cn-guangzhou.personal.cr.aliyuncs.com/qqy_my_re/bank-mall-payment
  - name: 10.0.0.61/bank-mall/notification-service
    newName: crpi-czgg1cl74ayotw3x.cn-guangzhou.personal.cr.aliyuncs.com/qqy_my_re/bank-mall-notification
patches:
  # Ingress: NodePort → LoadBalancer (ACK auto-creates SLB)
  - path: patches/ingress-lb.yaml
    target:
      kind: Service
      name: ingress-nginx-controller
  # MySQL: remove hardcoded nodeName (ACK scheduler picks the node)
  - path: patches/remove-nodename.yaml
    target:
      kind: Deployment
      name: mysql
