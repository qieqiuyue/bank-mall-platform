# ResourceQuota — 限制整个 namespace 的资源总量，防止单个服务耗尽集群
apiVersion: v1
kind: ResourceQuota
metadata:
  name: bank-mall-quota
  namespace: bank-mall
spec:
  hard:
    requests.cpu: "4"
    requests.memory: "8Gi"
    limits.cpu: "8"
    limits.memory: "16Gi"
    pods: "20"
    services: "10"
    persistentvolumeclaims: "5"
