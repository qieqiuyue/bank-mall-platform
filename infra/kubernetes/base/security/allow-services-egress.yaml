apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-services-egress
  namespace: bank-mall
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: bank-mall
  policyTypes:
  - Egress
  egress:
  # Allow access to MySQL
  - to:
    - podSelector:
        matchLabels:
          app: mysql
    ports:
    - protocol: TCP
      port: 3306
  # Allow service-to-service HTTP on all app ports (8081-8084)
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/part-of: bank-mall
    ports:
    - protocol: TCP
      port: 8081
    - protocol: TCP
      port: 8082
    - protocol: TCP
      port: 8083
    - protocol: TCP
      port: 8084