apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.account.image.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.account.image.name }}
    {{- include "bank-mall.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Values.account.image.name }}
  ports:
  - name: http
    port: {{ .Values.account.ports.http }}
    targetPort: {{ .Values.account.ports.http }}
    protocol: TCP
